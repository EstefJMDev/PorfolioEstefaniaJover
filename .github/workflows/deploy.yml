name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip if this is already a deploy commit to avoid loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Copy built files to repo root
        run: |
          # Remove old built assets to avoid stale hashed files
          rm -rf ./assets
          # Copy built output to repo root so GitHub Pages serves it directly
          cp -r dist/assets ./assets
          cp dist/index.html ./index.html
          # Sync public files (cv, photos, legal pages)
          rsync -a --exclude='assets' --exclude='index.html' dist/ ./
          # Prevent Jekyll from processing the site
          touch .nojekyll

      - name: Commit and push built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets/ .nojekyll
          git add legal/ cv-estefania-jover-martinez.pdf pixel-avatar.jpg pixel-avatar.png profile-photo.jpg 2>/dev/null || true
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: deploy built files [skip ci]"
          git push
